site_name: Propuesta ANII TDE_1_2026 — Proyecto Cuaderno Digital
site_description: Sitio interno del equipo Critertec para el proyecto de investigación sobre intervención pedagógica docente con cuaderno digital instrumentado.
site_author: Equipo Critertec Educación
copyright: © 2026 Critertec Educación — Uso interno del equipo

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang:
        - es
        - en

nav:
  - Inicio: index.md
  - Para Berenice:
    - para-berenice/index.md
    - "Paso 1 · El proyecto": para-berenice/1-el-proyecto.md
    - "Paso 2 · Estado actual": para-berenice/2-estado-actual.md
    - "Paso 3 · Lo crítico de ti": para-berenice/3-lo-critico.md
    - "Paso 4 · La propuesta": para-berenice/4-la-propuesta.md
    - "Paso 5 · Tus 17 observaciones": para-berenice/5-respuestas-feedback.md
    - "Paso 6 · Próximos pasos": para-berenice/6-proximos-pasos.md
  - Tablero de control:
    - tablero/index.md
    - tablero/checklist-anii.md
    - tablero/kanban.md
    - tablero/decisiones.md
  - El proyecto:
    - el-proyecto/que-es.md
    - el-proyecto/por-que-importa.md
    - el-proyecto/como-funciona.md
    - el-proyecto/linea-de-tiempo.md
  - El equipo:
    - el-equipo/roles.md
    - el-equipo/berenice.md
    - el-equipo/sebas.md
    - el-equipo/agus.md
    - el-equipo/steven.md
    - el-equipo/junior.md
  - Dónde estamos:
    - donde-estamos/estado.md
    - donde-estamos/fortalezas.md
    - donde-estamos/riesgos.md
    - donde-estamos/tareas.md
  - Profundización académica:
    - academico/propuesta-completa.md
    - academico/pregunta-y-modelo.md
    - academico/marco-conceptual-criter.md
    - academico/marco-teorico.md
    - academico/metodologia.md
    - academico/feedback-revisor.md
    - academico/panel-review.md
  - Referencias:
    - referencias/glosario.md
    - referencias/bibliografia.md
    - referencias/enlaces.md

extra_css:
  - stylesheets/dashboard.css

extra:
  generator: false
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:sebastian.moreno@critertec.com
      name: Contacto equipo
